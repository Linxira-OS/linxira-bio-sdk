name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-gnu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc
      - run: >-
          rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal
          --component rustfmt --component clippy
      - name: Install pinned CI Python dependencies
        shell: pwsh
        run: |
          python -m venv .venv-ci
          .\.venv-ci\Scripts\python.exe -m pip install --disable-pip-version-check --requirement requirements-ci.txt
      - name: Configure GNU linker
        shell: pwsh
        run: |
          $ucrtBin = Join-Path '${{ steps.msys2.outputs.msys2-location }}' 'ucrt64\bin'
          $linker = Join-Path $ucrtBin 'gcc.exe'
          if (-not (Test-Path -LiteralPath $linker -PathType Leaf)) {
            throw "MSYS2 UCRT64 linker not found at $linker"
          }
          $ucrtBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$linker" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - run: cargo +stable-x86_64-pc-windows-gnu fmt --all -- --check
      - run: cargo +stable-x86_64-pc-windows-gnu clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo +stable-x86_64-pc-windows-gnu test --locked --workspace
      - run: cargo +stable-x86_64-pc-windows-gnu run --locked -p linxira-bio-cli -- sequence stats tests/fixtures/sequences/tiny.fa --json
      - run: .\.venv-ci\Scripts\python.exe scripts/validate-repository.py
      - run: .\.venv-ci\Scripts\python.exe scripts/stage-release.py --check
      - run: cargo +stable-x86_64-pc-windows-gnu build --locked --release --workspace
      - name: Stage Windows release
        run: >-
          .\.venv-ci\Scripts\python.exe scripts/stage-release.py
          --platform windows --binary-dir target\release
          --output build\release-windows

  debian-bookworm:
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      - run: apt-get update
      - run: >-
          apt-get install -y build-essential curl git libgl1-mesa-dev libwayland-dev
          libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxkbcommon-dev
          libxrandr-dev pkg-config python3 python3-venv
      - uses: actions/checkout@v7
      - name: Install pinned CI Python dependencies
        run: |
          python3 -m venv .venv-ci
          .venv-ci/bin/python -m pip install --disable-pip-version-check --requirement requirements-ci.txt
      - run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
      - run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace
      - run: cargo run --locked -p linxira-bio-worker -- tests/fixtures/jobs/sequence-stats.json
      - run: cargo run --locked -p linxira-bio-cli -- sequence stats tests/fixtures/sequences/tiny.fa --json
      - run: .venv-ci/bin/python scripts/validate-repository.py
      - run: .venv-ci/bin/python scripts/stage-release.py --check
      - run: cargo build --locked --release --workspace
      - name: Stage Debian release
        run: >-
          .venv-ci/bin/python scripts/stage-release.py
          --platform debian --binary-dir target/release
          --output build/release-debian

  arch-linux:
    runs-on: ubuntu-latest
    container: archlinux:base
    steps:
      - run: >-
          pacman -Syu --noconfirm base-devel curl git libx11 libxcursor libxi
          libxinerama libxkbcommon libxrandr mesa pkgconf python python-pip rustup
          wayland
      - uses: actions/checkout@v7
      - name: Install pinned CI Python dependencies
        run: |
          python -m venv .venv-ci
          .venv-ci/bin/python -m pip install --disable-pip-version-check --requirement requirements-ci.txt
      - run: rustup default stable
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace
      - run: cargo run --locked -p linxira-bio-cli -- doctor --json
      - run: .venv-ci/bin/python scripts/validate-repository.py
      - run: .venv-ci/bin/python scripts/stage-release.py --check
      - run: cargo build --locked --release --workspace
      - name: Stage Arch release
        run: >-
          .venv-ci/bin/python scripts/stage-release.py
          --platform arch --binary-dir target/release
          --output build/release-arch

  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
