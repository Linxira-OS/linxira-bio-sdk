[advisories]
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2026-0194", reason = "quick-xml is only used by the wayland-scanner proc macro to parse dependency-owned protocol XML at build time; wayland-scanner 0.31.10 still requires quick-xml ^0.39" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml is only used by the wayland-scanner proc macro to parse dependency-owned protocol XML at build time; wayland-scanner 0.31.10 still requires quick-xml ^0.39" },
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"

[licenses]
confidence-threshold = 0.8
allow = [
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "Unicode-3.0",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
